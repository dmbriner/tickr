<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Tickr</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body data-page="login">
    <div class="siteShell">
      <header class="topNav surface">
        <a class="brand" href="./index.html">Tickr</a>
        <nav class="navLinks" aria-label="Primary">
          <a href="./login.html" aria-current="page">Login</a>
          <a href="https://github.com/dmbriner/tickr" target="_blank" rel="noreferrer">GitHub</a>
        </nav>
      </header>

      <main class="authWrap">
        <section class="authCard surface">
          <h1>Account Access</h1>
          <p class="statusText">Create an account or sign in to access Tickr and save your data.</p>
          <div class="buttonRow authModeRow" role="tablist" aria-label="Authentication mode">
            <button id="login-mode-button" class="button secondary" type="button">Sign In</button>
            <button id="signup-mode-button" class="button secondary" type="button">Sign Up</button>
          </div>
          <form id="login-form" class="formStack" novalidate>
            <label class="field">
              <span>Email</span>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </label>
            <label class="field">
              <span>Password</span>
              <input id="password" name="password" type="password" autocomplete="current-password" required minlength="8" />
            </label>
            <label id="confirm-password-field" class="field" hidden>
              <span>Confirm Password</span>
              <input
                id="confirm-password"
                name="confirmPassword"
                type="password"
                autocomplete="new-password"
                minlength="8"
              />
            </label>
            <p id="login-error" class="inlineError" role="alert" hidden></p>
            <p id="login-success" class="inlineSuccess" role="status" hidden></p>
            <button id="auth-submit" class="button primary" type="submit">Sign In</button>
          </form>
        </section>
      </main>

      <footer class="siteFooter">
        <span>&copy; <span data-current-year></span> Dana Briner</span>
      </footer>
    </div>
    <script src="assets/config.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
